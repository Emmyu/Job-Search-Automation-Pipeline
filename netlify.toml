[build]
  command = "npm install && npm run build"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["dist/**"]

# API routes → Express serverless function (order matters: API before SPA)
[[redirects]]
  from = "/health"
  to = "/.netlify/functions/server"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200

# React SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
